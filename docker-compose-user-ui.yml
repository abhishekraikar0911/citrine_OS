version: "3.9"

services:
  # CitrineoS User UI - For EV Drivers
  citrineos-user-ui:
    image: node:24-alpine
    container_name: citrineos-user-ui
    working_dir: /app
    volumes:
      - ./citrineos-user-ui:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_HASURA_URL: http://103.174.148.201:8090/v1/graphql
      NEXT_PUBLIC_HASURA_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-CitrineOS!}
      NEXT_PUBLIC_CITRINEOS_API_URL: http://103.174.148.201:8081
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - ocpp-db
      - amqp-broker
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 512M
    command: sh -c "npm install && npm run build && npm start"

version: "3.9"

services:
  amqp-broker:
    image: rabbitmq:3-management
    container_name: csms-rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  ocpp-db:
    image: postgis/postgis:16-3.5
    container_name: csms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgresql/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 512M

  citrine:
    build:
      context: ./citrineos-core
      dockerfile: ./Server/deploy.Dockerfile
    container_name: csms-core
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      DB_STRATEGY: ${DB_STRATEGY}
      BOOTSTRAP_CITRINEOS_DATABASE_HOST: "ocpp-db"
      BOOTSTRAP_CITRINEOS_CONFIG_FILENAME: ${BOOTSTRAP_CITRINEOS_CONFIG_FILENAME}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_TYPE: ${BOOTSTRAP_CITRINEOS_FILE_ACCESS_TYPE}
      BOOTSTRAP_CITRINEOS_FILE_ACCESS_LOCAL_DEFAULT_FILE_PATH: ${BOOTSTRAP_CITRINEOS_FILE_ACCESS_LOCAL_DEFAULT_FILE_PATH}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      ocpp-db:
        condition: service_healthy
      amqp-broker:
        condition: service_healthy
    ports:
      - "8081:8080" # API (Central System)
      - "8082:8082" # OCPP 2.0.1 Profile 1
      - "8443:8443" # OCPP 2.0.1 Profile 2 (TLS)
      - "8444:8444" # OCPP 2.0.1 Profile 3 (mTLS)
      - "9229:9229" # Debug
      - "8092:8092" # OCPP 1.6 Profile 0
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"const net=require('net');const c=net.createConnection(8080,'127.0.0.1',()=>{c.end();process.exit(0);});c.on('error',()=>process.exit(1));\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          memory: 1G

  graphql-engine:
    image: hasura/graphql-engine:v2.40.3.cli-migrations-v3
    ports:
      - "8090:8080" # Moved from 8080 to avoid conflict with citrine
    restart: always
    depends_on:
      citrine:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ocpp-db:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET}
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8080/healthz' ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
